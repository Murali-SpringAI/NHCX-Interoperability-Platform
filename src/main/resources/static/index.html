<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NHCX Interoperability Platform</title>

    ```
    <style>
        body {
            font-family: Arial, sans-serif;

            color: #1b4f72;

            flex: 1;

    ```

</head>

<body>

<h1>
    NHCX Interoperability Platform
    <span class="badge">AI Enabled</span>
</h1>

<p>
    Ingest HL7 or CSV → Normalize → AI Enrichment → FHIR Bundle
</p>

<div>
    <label>Source Type:</label>
    <select id="sourceType">
        <option value="HL7">HL7 (Eligibility)</option>
        <option value="CSV">CSV (Eligibility)</option>
        <option value="CLAIM_CSV">CSV (Claim)</option>
    </select>

    ```
    <label>Use Case:</label>
    <select id="useCase">
        <option value="ELIGIBILITY">Eligibility</option>
        <option value="CLAIM">Claim</option>
    </select>

    <button onclick="transform()">Transform to FHIR</button>
    ```

</div>

<br>

<div class="container">
    <div class="panel">
        <h3>Input Payload</h3>
        <textarea id="payload">
MSH|^~\&|HIS|RIH|EKG|EKG|202403031200||ADT^A01|MSG00001|P|2.5
PID|||12345^^^HOSP^MR||Doe^John||19800101|m
IN1|1|HMO123|89001|ABC Insurance||||||||||||||||||||||||||||||||POL998877
DG1|1||diabetes^high blood sugar
        </textarea>
    </div>

    ```
    <div class="panel">
        <h3>FHIR Output</h3>
        <div id="output">Click "Transform to FHIR"</div>
    </div>
    ```

</div>

<script>

    async function transform() {

        const payload = document.getElementById("payload").value;
        const sourceType = document.getElementById("sourceType").value;
        const useCase = document.getElementById("useCase").value;

        document.getElementById("output").innerText = "Processing... (AI + FHIR)";

        try {
            const response = await fetch(
                `/transform?sourceType=${sourceType}&useCase=${useCase}`,
                {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: payload
                }
            );

            const text = await response.text();
            document.getElementById("output").innerText = text;

        } catch (err) {
            document.getElementById("output").innerText =
                "Error calling platform: " + err;
        }
    }

</script>

</body>
</html>
